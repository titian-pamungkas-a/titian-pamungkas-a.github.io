<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <center><h2>Validasi Vaksin SMA Negeri 2 Lumajang</h2></center>
	<div class="login">
		<form action="#" method="POST" onSubmit="validasi()">
			<div>
				<label>Nama Lengkap :</label>
				<input type="text" name="nama" id="nama" />
			</div>
            <div>
				<label>NRP :</label>
				<input type="text" name="NRP" id="NRP" />
			</div>
			<div>

				<input type="email" name="email" id="email" />
			</div>
            <div>
				<label>Domisili :</label>

			</div>
			<div>
				<label>Alamat :</label>
				<input type="text" name="alamat" id="alamat" />
			</div>
            <div>
				<label>Alamat :</label>
				<input type="text" name="alamat" id="alamat" />
			</div>
            <div>
                <label for="">Status Vaksin</label>
                <select name="status" id="status">
                    <option value="belum_vaksin">Belum Vaksin</option>
                    <option value="vaksin1">Vaksin sekali</option>
                    <option value="vaksin2">Vaksin 2 kali</option>
                </select>

            </div>
			<div>
				<input type="submit" value="Daftar" class="tombol">
			</div>
		</form>
	</div>
</body>
<script type="text/javascript">
	function validasi() {
		var nama = document.getElementById("nama").value;
		var email = document.getElementById("email").value;
		var alamat = document.getElementById("alamat").value;
		if (nama != "" && email!="" && alamat !="") {
			return true;

	}
</script>
